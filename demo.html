<!doctype html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Spese di Casa — Demo</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--bg:#f7f7fb;--fg:#1f2937;--muted:#6b7280;--card:#fff;--border:#e5e7eb;--accent:#4338ca;}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg)}
.container{max-width:1100px;margin:0 auto;padding:24px 16px 64px}
.app-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px}
h1{margin:0;font-size:24px}
h3{margin-top:0}
h4,h5{margin:12px 0 6px}
.banner{background:#fef3c7;border:1px solid #fcd34d;color:#92400e;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}
.tabs{display:flex;gap:4px}
.tabs button{background:transparent;border:1px solid var(--border);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:14px}
.tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.muted{color:var(--muted);font-size:13px}
.list{list-style:none;padding:0;margin:8px 0 0}
.list li{padding:8px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:14px}
.list li:last-child{border-bottom:none}
.dot{width:12px;height:12px;border-radius:50%;display:inline-block}
.cal-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.cal-header button{background:var(--card);border:1px solid var(--border);width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:18px}
.cal-header h3{margin:0;min-width:180px;text-align:center}
.cal-header .spacer{flex:1}
.cal-header select{padding:6px 10px;border:1px solid var(--border);border-radius:6px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{text-align:center;font-size:12px;color:var(--muted);padding:4px 0;font-weight:600}
.cal-cell{position:relative;aspect-ratio:1/1;border:1px solid var(--border);border-radius:8px;padding:6px;cursor:pointer;display:flex;flex-direction:column;justify-content:space-between;min-height:64px;transition:transform .1s}
.cal-cell:hover{transform:scale(1.02)}
.cal-cell.empty{border:none;cursor:default}
.cal-cell.empty:hover{transform:none}
.cal-cell.today{outline:2px solid var(--accent)}
.cal-cell.holiday .cal-day-num{color:#b91c1c;font-weight:700}
.cal-cell.selected{outline:2px solid #f59e0b}
.cal-day-num{font-size:12px;font-weight:600}
.cal-day-total{font-size:11px;font-weight:600}
.cal-pin{position:absolute;top:4px;right:6px;font-size:10px;color:#f59e0b}
.day-detail{margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.legend{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.legend-bar{width:120px;height:10px;border-radius:5px;background:linear-gradient(to right,#eef2ff,#4338ca)}
@media(max-width:600px){.cal-cell{min-height:48px;padding:3px}.cal-day-num{font-size:11px}.cal-day-total{font-size:9px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const {useState, useMemo} = React;

// ---------- Festività italiane ----------
function easterSunday(year){
  const a=year%19,b=Math.floor(year/100),c=year%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),month=Math.floor((h+l-7*m+114)/31),day=((h+l-7*m+114)%31)+1;
  return new Date(year,month-1,day);
}
const holidayCache=new Map();
function italianHolidays(year){
  if(holidayCache.has(year))return holidayCache.get(year);
  const easter=easterSunday(year),em=new Date(easter);em.setDate(easter.getDate()+1);
  const fixed=[[1,1],[1,6],[4,25],[5,1],[6,2],[8,15],[11,1],[12,8],[12,25],[12,26]];
  const set=new Set();
  fixed.forEach(([m,d])=>set.add(isoDate(new Date(year,m-1,d))));
  set.add(isoDate(easter));set.add(isoDate(em));
  holidayCache.set(year,set);return set;
}
function isoDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function isHoliday(d){return italianHolidays(d.getFullYear()).has(isoDate(d))}
function isWeekend(d){const w=d.getDay();return w===0||w===6}
function isNonBusiness(d){return isWeekend(d)||isHoliday(d)}
function adjustForHolidays(date,adjust){
  if(adjust==='none'||!adjust)return date;
  const d=new Date(date),step=adjust==='previous'?-1:1;
  while(isNonBusiness(d))d.setDate(d.getDate()+step);
  return d;
}

// ---------- Espansione ricorrenze ----------
function expandRecurring(rule,from,to){
  const out=[],start=new Date(rule.start_date),end=rule.end_date?new Date(rule.end_date):null;
  const rs=from<start?start:from,re=end&&end<to?end:to;
  if(rs>re)return out;
  if(rule.frequency==='monthly'){
    const cur=new Date(rs.getFullYear(),rs.getMonth(),1);
    while(cur<=re){
      const y=cur.getFullYear(),m=cur.getMonth(),last=new Date(y,m+1,0).getDate(),day=Math.min(rule.day_of_month||1,last);
      const occ=new Date(y,m,day);
      if(occ>=start&&(!end||occ<=end)){
        const adj=adjustForHolidays(occ,rule.holiday_adjust);
        if(adj>=rs&&adj<=re)out.push({date:isoDate(adj),amount:+rule.amount,label:rule.label,category:rule.category,account_id:rule.account_id,planned:true});
      }
      cur.setMonth(cur.getMonth()+1);
    }
  } else if(rule.frequency==='yearly'){
    const month=(rule.month_of_year||1)-1,day=rule.day_of_month||1;
    for(let y=rs.getFullYear();y<=re.getFullYear();y++){
      const occ=new Date(y,month,day);
      if(occ<start||(end&&occ>end))continue;
      const adj=adjustForHolidays(occ,rule.holiday_adjust);
      if(adj>=rs&&adj<=re)out.push({date:isoDate(adj),amount:+rule.amount,label:rule.label,category:rule.category,account_id:rule.account_id,planned:true});
    }
  }
  return out;
}

// ---------- Dati di esempio (1 anno) ----------
const ACCOUNTS=[
  {id:'a1',name:'Carta',color:'#4338ca'},
  {id:'a2',name:'Contanti',color:'#16a34a'},
  {id:'a3',name:'Conto Corrente',color:'#0ea5e9'},
];
const RECURRING=[
  {id:'r1',label:'Affitto',amount:850,category:'Casa',account_id:'a3',frequency:'monthly',day_of_month:1,holiday_adjust:'next',start_date:'2025-04-01',end_date:null,active:true},
  {id:'r2',label:'Palestra',amount:45,category:'Salute',account_id:'a1',frequency:'monthly',day_of_month:5,holiday_adjust:'none',start_date:'2025-04-01',end_date:null,active:true},
  {id:'r3',label:'Bolletta luce/gas',amount:120,category:'Bollette',account_id:'a3',frequency:'monthly',day_of_month:15,holiday_adjust:'previous',start_date:'2025-04-01',end_date:null,active:true},
  {id:'r4',label:'Internet',amount:30,category:'Bollette',account_id:'a3',frequency:'monthly',day_of_month:20,holiday_adjust:'none',start_date:'2025-04-01',end_date:null,active:true},
  {id:'r5',label:'Assicurazione auto',amount:480,category:'Auto',account_id:'a3',frequency:'yearly',month_of_year:9,day_of_month:10,holiday_adjust:'next',start_date:'2025-04-01',end_date:null,active:true},
];

// PRNG deterministico per dati riproducibili
function mulberry32(seed){return function(){let t=seed+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
const rand=mulberry32(42);

// Genera 1 anno di spese (dal 2025-04-08 al 2026-04-07 — la data corrente del demo)
function generateYear(){
  const items=[];
  const end=new Date(2026,3,7); // 2026-04-07
  const start=new Date(2025,3,8); // 2025-04-08
  const cats=[
    {name:'Spesa',min:8,max:90,p:0.7,acc:['a1','a2']},
    {name:'Ristorante',min:12,max:65,p:0.18,acc:['a1']},
    {name:'Trasporti',min:2,max:25,p:0.25,acc:['a1','a2']},
    {name:'Caffè',min:1,max:6,p:0.5,acc:['a2']},
    {name:'Svago',min:5,max:60,p:0.10,acc:['a1']},
    {name:'Abbigliamento',min:20,max:120,p:0.05,acc:['a1']},
    {name:'Salute',min:10,max:80,p:0.04,acc:['a1','a3']},
    {name:'Casa/varie',min:3,max:40,p:0.15,acc:['a1','a2']},
  ];
  let id=0;
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
    const dateStr=isoDate(d);
    const dow=d.getDay();
    const weekendBoost=dow===0||dow===6?1.4:1;
    cats.forEach(c=>{
      if(rand()<c.p*weekendBoost*0.85){
        const amt=Math.round((c.min+rand()*(c.max-c.min))*100)/100;
        const acc=c.acc[Math.floor(rand()*c.acc.length)];
        items.push({
          id:'e'+(id++),
          date:dateStr,
          amount:amt,
          category:c.name,
          account_id:acc,
          note:c.name,
          source:'wallet_csv',
        });
      }
    });
  }
  return items;
}
const EXPENSES=generateYear();

// ---------- Calendar ----------
const MONTHS=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const DOW=['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
function startOfMonth(y,m){return new Date(y,m,1)}
function endOfMonth(y,m){return new Date(y,m+1,0)}
function colorFor(amount,max){
  if(!amount)return 'transparent';
  const t=Math.min(1,amount/(max||1));
  const lerp=(a,b)=>Math.round(a+(b-a)*t);
  return `rgb(${lerp(238,67)},${lerp(242,56)},${lerp(255,202)})`;
}

function Calendar({expenses,recurring,accounts}){
  const today=new Date(2026,3,7);
  const [year,setYear]=useState(today.getFullYear());
  const [month,setMonth]=useState(today.getMonth());
  const [sel,setSel]=useState(null);
  const [filt,setFilt]=useState('');

  const {byDay,max}=useMemo(()=>{
    const from=startOfMonth(year,month),to=endOfMonth(year,month),map=new Map();
    const push=(date,it)=>{if(!map.has(date))map.set(date,{actual:[],planned:[],total:0});const e=map.get(date);if(it.planned)e.planned.push(it);else e.actual.push(it);e.total+=+it.amount||0};
    expenses.forEach(x=>{if(x.date<isoDate(from)||x.date>isoDate(to))return;if(filt&&x.account_id!==filt)return;push(x.date,x)});
    recurring.forEach(r=>{if(!r.active)return;if(filt&&r.account_id!==filt)return;expandRecurring(r,from,to).forEach(o=>push(o.date,o))});
    let mx=0;for(const v of map.values())if(v.total>mx)mx=v.total;
    return {byDay:map,max:mx};
  },[expenses,recurring,year,month,filt]);

  const first=startOfMonth(year,month),last=endOfMonth(year,month);
  const startWd=(first.getDay()+6)%7;
  const cells=[];
  for(let i=0;i<startWd;i++)cells.push(null);
  for(let d=1;d<=last.getDate();d++)cells.push(new Date(year,month,d));
  while(cells.length%7!==0)cells.push(null);

  const accName=id=>accounts.find(a=>a.id===id)?.name||'';
  const prev=()=>{if(month===0){setMonth(11);setYear(year-1)}else setMonth(month-1)};
  const next=()=>{if(month===11){setMonth(0);setYear(year+1)}else setMonth(month+1)};

  const dayData=sel&&byDay.get(sel);
  const monthTotal=Array.from(byDay.values()).reduce((s,v)=>s+v.total,0);

  return (
    <div className="card">
      <div className="cal-header">
        <button onClick={prev}>‹</button>
        <h3>{MONTHS[month]} {year}</h3>
        <button onClick={next}>›</button>
        <div className="spacer"/>
        <select value={filt} onChange={e=>setFilt(e.target.value)}>
          <option value="">Tutti i conti</option>
          {accounts.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
        </select>
        <span className="muted">Totale mese: €{monthTotal.toFixed(2)}</span>
      </div>
      <div className="cal-grid">
        {DOW.map(d=><div key={d} className="cal-dow">{d}</div>)}
        {cells.map((date,i)=>{
          if(!date)return <div key={i} className="cal-cell empty"/>;
          const key=isoDate(date),data=byDay.get(key);
          const isToday=isoDate(today)===key,hol=isHoliday(date);
          const bg=data?colorFor(data.total,max):'transparent';
          return (
            <div key={i}
              className={`cal-cell ${isToday?'today':''} ${hol?'holiday':''} ${sel===key?'selected':''}`}
              style={{background:bg}}
              onClick={()=>setSel(key)}>
              <div className="cal-day-num">{date.getDate()}</div>
              {data && <div className="cal-day-total">€{data.total.toFixed(0)}</div>}
              {data?.planned?.length>0 && <div className="cal-pin" title="Pianificata">●</div>}
            </div>
          );
        })}
      </div>
      <div className="legend" style={{marginTop:12}}>
        <span>poco</span><div className="legend-bar"/><span>molto</span>
        <span style={{marginLeft:16}}>● = spesa pianificata · <span style={{color:'#b91c1c',fontWeight:700}}>festivo</span></span>
      </div>
      {dayData && (
        <div className="day-detail">
          <h4>Dettaglio {sel}</h4>
          {dayData.actual.length===0&&dayData.planned.length===0&&<p>Nessuna spesa.</p>}
          {dayData.actual.length>0 && <>
            <h5>Effettuate</h5>
            <ul className="list">{dayData.actual.map((x,i)=>(
              <li key={i}>€{(+x.amount).toFixed(2)} — {x.category||'—'} · {accName(x.account_id)}</li>
            ))}</ul>
          </>}
          {dayData.planned.length>0 && <>
            <h5>Pianificate</h5>
            <ul className="list">{dayData.planned.map((x,i)=>(
              <li key={i}>€{(+x.amount).toFixed(2)} — {x.label} · {accName(x.account_id)}</li>
            ))}</ul>
          </>}
        </div>
      )}
    </div>
  );
}

function Accounts({accounts}){
  return (
    <div className="card">
      <h3>Conti (demo, sola lettura)</h3>
      <ul className="list">
        {accounts.map(a=>(
          <li key={a.id}><span className="dot" style={{background:a.color}}/>{a.name}</li>
        ))}
      </ul>
    </div>
  );
}

function Recurring({recurring,accounts}){
  const accName=id=>accounts.find(a=>a.id===id)?.name||'';
  return (
    <div className="card">
      <h3>Spese ricorrenti (demo, sola lettura)</h3>
      <ul className="list">
        {recurring.map(r=>(
          <li key={r.id}>
            <strong>{r.label}</strong> — €{(+r.amount).toFixed(2)} ·{' '}
            {r.frequency==='monthly'&&`mensile g.${r.day_of_month}`}
            {r.frequency==='yearly'&&`annuale ${r.day_of_month}/${r.month_of_year}`}
            {r.holiday_adjust!=='none'&&` · ${r.holiday_adjust==='previous'?'←':'→'} festivi`}
            {' · '}{accName(r.account_id)}
          </li>
        ))}
      </ul>
    </div>
  );
}

function App(){
  const [tab,setTab]=useState('calendar');
  const totalY=EXPENSES.reduce((s,x)=>s+x.amount,0);
  return (
    <div className="container">
      <header className="app-header">
        <h1>Spese di Casa <span className="muted">— Demo</span></h1>
        <nav className="tabs">
          <button className={tab==='calendar'?'active':''} onClick={()=>setTab('calendar')}>Calendario</button>
          <button className={tab==='recurring'?'active':''} onClick={()=>setTab('recurring')}>Ricorrenti</button>
          <button className={tab==='accounts'?'active':''} onClick={()=>setTab('accounts')}>Conti</button>
        </nav>
      </header>
      <div className="banner">
        Demo statica con dati di esempio: <strong>{EXPENSES.length}</strong> spese generate dall'08/04/2025 al 07/04/2026
        (totale annuo €{totalY.toFixed(2)}) + {RECURRING.length} ricorrenze. Naviga il calendario per vedere la heatmap.
      </div>
      {tab==='calendar' && <Calendar expenses={EXPENSES} recurring={RECURRING} accounts={ACCOUNTS}/>}
      {tab==='recurring' && <Recurring recurring={RECURRING} accounts={ACCOUNTS}/>}
      {tab==='accounts' && <Accounts accounts={ACCOUNTS}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
